<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpaceX Clone</title>
    <!-- Nhập font chữ Barlow từ Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Thư viện AOS dùng để tạo hiệu ứng khi cuộn chuột (Animate On Scroll) -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<!-- Lớp snap-container kích hoạt tính năng tự động "hít" vào từng phần khi cuộn -->
<body class="snap-container">
    <!-- Các dấu chấm điều hướng bên phải màn hình -->
    <div class="side-dots">
        <a href="#section1" class="dot active"></a>
        <a href="#section2" class="dot"></a>
        <a href="#footer" class="dot"></a>
    </div>

    <!-- Thanh menu chính (Header) -->
    <header class="main-header">
        <div class="logo">
            <!-- Logo SpaceX dưới dạng SVG (đồ họa vector) -->
            <svg version="1.1" x="0px" y="0px" viewBox="0 0 400 50">
                <title>SpaceX Logo</title>
                <path fill="currentColor" d="M37.5,30.5H10.9v-6.6h33.4c-0.4-1.3-1.1-2.4-2.1-3.3L37.5,30.5z M10.9,14.6h25.4c-1.5-2.2-4.1-3.6-7.1-3.6H10.9v6.6H10.9z M30.7,40.1H10.9v-6.6h16.2L30.7,40.1z"></path>
            </svg>
        </div>
        
        <!-- Checkbox này được ẩn đi, dùng để điều khiển bật/tắt menu trên điện thoại -->
        <input type="checkbox" id="menu-btn" class="menu-btn">
        <!-- Biểu tượng 3 gạch (hamburger) cho di động -->
        <label for="menu-btn" class="menu-icon"><span class="navicon"></span></label>

        <nav>
            <ul class="menu">
                <li><a href="falcon9.html">FALCON 9</a></li>
                <li><a href="#">FALCON HEAVY</a></li>
                <li><a href="#">DRAGON</a></li>
                <li><a href="#">STARSHIP</a></li>
                <li><a href="#">HUMAN SPACEFLIGHT</a></li>
            </ul>
        </nav>
    </header>

    <!-- Phần 1: Giới thiệu chính (Hero Section) -->
    <section id="section1" class="section-hero">
        <!-- Video nền tự động chạy, tắt tiếng và lặp lại -->
        <video autoplay muted loop playsinline class="video-bg">
            <source src="videos/starship.mp4" type="video/mp4">
        </video>
        <!-- Nội dung văn bản với hiệu ứng bay lên (fade-up) từ AOS -->
        <div class="content" data-aos="fade-up" data-aos-duration="1000">
            <h4>UPCOMING LAUNCH</h4>
            <h2>STARLINK MISSION</h2>
            <a href="https://www.facebook.com/vutttien/" target="_blank" class="btn">WATCH</a>
        </div>
        <!-- Biểu tượng mũi tên cuộn xuống -->
        <div class="scroll-down">
            <svg width="30" height="20" viewBox="0 0 30 20">
                <path d="M2 2L15 15L28 2" stroke="white" stroke-width="2" fill="none" />
            </svg>
        </div>
    </section>

    <!-- Phần 2: Nhiệm vụ gần đây -->
    <section id="section2" class="section-hero">
        <video autoplay muted loop playsinline class="video-bg">
            <source src="videos/landing.mp4" type="video/mp4">
        </video>
        <div class="content" data-aos="fade-up" data-aos-duration="1000">
            <h4>RECENT MISSION</h4>
            <h2>CREW-7 MISSION</h2>
            <button class="btn">REWATCH</button>
        </div>
    </section>

    <!-- Chân trang (Footer) -->
    <footer id="footer" class="main-footer">
        <div class="footer-links">
            <span>SPACEX © 2024</span>
            <a href="#">TWITTER</a>
            <a href="#">YOUTUBE</a>
            <a href="#">INSTAGRAM</a>
        </div>
    </footer>

    <!-- Nạp file JavaScript của thư viện AOS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <!-- Khởi tạo AOS để các hiệu ứng data-aos hoạt động -->
    <script>
        AOS.init();

        // Chức năng tự động cập nhật dấu chấm (Side Dots) khi cuộn
        const sections = document.querySelectorAll('section, footer');
        const dots = document.querySelectorAll('.dot');

        const observerOptions = {
            threshold: 0.5 // Kích hoạt khi phần tử hiện diện 50% trên màn hình
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    dots.forEach(dot => dot.classList.remove('active'));
                    const activeDot = document.querySelector(`.dot[href="#${entry.target.id}"]`);
                    if (activeDot) activeDot.classList.add('active');
                }
            });
        }, observerOptions);

        sections.forEach(section => observer.observe(section));
    </script>
</body>
</html>
